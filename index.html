<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct-to-Mood Marketing Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:linear-gradient(160deg,#050816 0%,#0c1030 40%,#1a0e2e 70%,#0d0820 100%);min-height:100vh;color:#fff;overflow-x:hidden}
    .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
    .gradient-text{background:linear-gradient(135deg,#667eea 0%,#a855f7 50%,#f093fb 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .mood-card{transition:all .3s ease;cursor:pointer;border:2px solid transparent}
    .mood-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(102,126,234,0.2)}
    .mood-card.selected{border-color:#a855f7;box-shadow:0 0 20px rgba(168,85,247,0.3)}
    .generate-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);transition:all .3s ease}
    .generate-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(102,126,234,0.4)}
    .generate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .animate-in{animation:fadeUp 0.5s ease-out forwards}
    .stream-pulse{animation:pulse 1.5s ease-in-out infinite}
    .img-shimmer{background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    .asset-text{border-left:3px solid #667eea;padding-left:20px}
    .asset-image{border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,0.4)}
    .asset-image img{width:100%;display:block;border-radius:16px}
    .refine-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;outline:none;transition:border-color .2s}
    .refine-input:focus{border-color:#a855f7}
    .tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
    .tag-text{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .tag-image{background:linear-gradient(135deg,#f093fb,#ec4899);color:#fff}
    .tag-native{background:rgba(34,197,94,0.2);color:#22c55e;border:1px solid rgba(34,197,94,0.3);font-size:10px}
    .status-bar{background:rgba(102,126,234,0.1);border:1px solid rgba(102,126,234,0.2);border-radius:12px;padding:10px 20px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── MOODS ──
const MOODS = [
  { id: 'elegant', name: 'Elegant & Sophisticated', desc: 'Refined luxury appeal', icon: '✨' },
  { id: 'energetic', name: 'Energetic & Bold', desc: 'Dynamic and vibrant', icon: '⚡' },
  { id: 'minimal', name: 'Minimal & Clean', desc: 'Simple and modern', icon: '◻️' },
  { id: 'warm', name: 'Warm & Inviting', desc: 'Friendly and approachable', icon: '🌅' },
  { id: 'dramatic', name: 'Dramatic & Intense', desc: 'High contrast and moody', icon: '🎭' },
  { id: 'playful', name: 'Playful & Fun', desc: 'Bright and cheerful', icon: '🎨' },
];

// ── MAIN APP ──
function App() {
  const [view, setView] = useState('landing'); // landing | generating | campaign
  const [businessInfo, setBusinessInfo] = useState('');
  const [mood, setMood] = useState('');
  const [assets, setAssets] = useState([]);
  const [status, setStatus] = useState('');
  const [model, setModel] = useState('');
  const [error, setError] = useState('');
  const [refinement, setRefinement] = useState('');
  const [isRefining, setIsRefining] = useState(false);
  const [conversationHistory, setConversationHistory] = useState([]);
  const [runId, setRunId] = useState('');
  const [mode, setMode] = useState('campaign'); // campaign | storyboard
  const [channel, setChannel] = useState('general');
  const [readingLevel, setReadingLevel] = useState('general');
  const [bannedWords, setBannedWords] = useState('');
  const [autoRevise, setAutoRevise] = useState(true);
  const [brandImageDataUrl, setBrandImageDataUrl] = useState('');
  const [brandImageName, setBrandImageName] = useState('');
  const [directorNotes, setDirectorNotes] = useState([]);
  const [brief, setBrief] = useState(null);
  const [qa, setQa] = useState(null);
  const [activeStep, setActiveStep] = useState('');
  const [videoUrl, setVideoUrl] = useState('');
  const [videoStatus, setVideoStatus] = useState('');
  const [isVideoGenerating, setIsVideoGenerating] = useState(false);
  const [videoAttempted, setVideoAttempted] = useState(false);
  const [campaignComplete, setCampaignComplete] = useState(false);
  const videoRef = useRef(null);
  const streamRef = useRef(null);

  const DEMOS = [
    {
      id: 'coffee',
      name: 'Cozy coffee brand',
      mood: 'warm',
      channel: 'instagram',
      text: 'A cozy neighborhood coffee shop in Austin specializing in single-origin pour-over coffee and freshly baked pastries. Target: remote workers and young professionals (25-35). Unique: latte art + quiet study vibe.',
    },
    {
      id: 'skincare',
      name: 'Minimal skincare',
      mood: 'minimal',
      channel: 'tiktok',
      text: 'A minimalist skincare brand for sensitive skin. Products: cleanser + moisturizer with short ingredient lists, fragrance-free. Target: skincare beginners who want clarity and calm.',
    },
    {
      id: 'fitness',
      name: 'Energetic fitness app',
      mood: 'energetic',
      channel: 'youtube',
      text: 'A fitness coaching app that creates 20-minute workouts for busy professionals. Includes progress tracking, streaks, and motivational coaching. Differentiator: adapts workouts based on stress/sleep.',
    },
  ];

  const loadDemo = (demoId) => {
    const d = DEMOS.find(x => x.id === demoId);
    if (!d) return;
    setBusinessInfo(d.text);
    setMood(d.mood);
    setChannel(d.channel);
    setReadingLevel('general');
    setBannedWords('');
    setMode('campaign');
    setAutoRevise(true);
    setBrandImageDataUrl('');
    setBrandImageName('');
  };

  const onPickBrandImage = async (file) => {
    if (!file) return;
    setBrandImageName(file.name);
    const reader = new FileReader();
    reader.onload = () => {
      setBrandImageDataUrl(String(reader.result || ''));
    };
    reader.readAsDataURL(file);
  };

  const handleGenerate = useCallback(async () => {
    if (!businessInfo.trim() || !mood) return;
    setView('generating');
    setAssets([]);
    setError('');
    setStatus('Connecting to Gemini...');
    setModel('');
    setRunId('');
    setDirectorNotes([]);
    setBrief(null);
    setQa(null);
    setActiveStep('');
    setVideoUrl('');
    setVideoStatus('');
    setIsVideoGenerating(false);
    setVideoAttempted(false);
    setCampaignComplete(false);

    try {
      const response = await fetch('/api/generate-campaign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          businessInfo: businessInfo.trim(),
          mood,
          mode,
          channel,
          readingLevel,
          bannedWords,
          autoRevise,
          brandImageDataUrl: brandImageDataUrl || undefined,
        }),
      });

      if (!response.ok) {
        let errMsg = 'Generation failed';
        try {
          const errText = await response.text();
          const errJson = JSON.parse(errText);
          errMsg = errJson.error || errJson.message || errMsg;
        } catch (parseErr) {
          errMsg = 'The server could not complete the request. This usually means the hosting platform timed out. Try the Cloud Run deployment instead: https://gcloud-830001350094.europe-west1.run.app';
        }
        throw new Error(errMsg);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6).trim();
            if (data === '[DONE]') {
              setView('campaign');
              continue;
            }
            try {
              const evt = JSON.parse(data);
              const kind = evt.event || evt.type; // backward compatibility

              if (kind === 'status') setStatus(evt.message);
              else if (kind === 'model') setModel(evt.name);
              else if (kind === 'run') setRunId(evt.runId || '');
              else if (kind === 'step') {
                setActiveStep(evt.step || '');
                if (evt.message) setStatus(evt.message);
              }
              else if (kind === 'director_note') {
                if (evt.message) setDirectorNotes(prev => [...prev, evt.message]);
              }
              else if (kind === 'brief') {
                setBrief(evt.brief || null);
              }
              else if (kind === 'qa') {
                setQa(evt);
              }
              else if (kind === 'replace_all') {
                setAssets([]);
                setQa(null);
                setVideoAttempted(false);
                setCampaignComplete(false);
              }
              else if (kind === 'asset') {
                const normalized = {
                  type: evt.assetType || evt.type, // asset payload type
                  content: evt.content,
                  mimeType: evt.mimeType,
                  index: evt.index,
                };
                setAssets(prev => [...prev, normalized]);
                setView('campaign');
              }
              else if (kind === 'complete') {
                setStatus(`✓ ${evt.assetCount} assets generated`);
                setCampaignComplete(true);
              }
              else if (kind === 'error') setError(evt.message);
            } catch (e) { /* skip parse errors */ }
          }
        }
      }

      // Save history for refinement
      setConversationHistory([
        { role: 'user', parts: [{ type: 'text', content: `Create campaign for: ${businessInfo}\nMood: ${mood}` }] },
        { role: 'model', parts: [{ type: 'text', content: 'Campaign generated successfully.' }] },
      ]);

    } catch (err) {
      const msg = err.message || String(err);
      const isTimeout = /abort|network|failed to fetch|server error|timed? ?out/i.test(msg);
      if (isTimeout && assets.length > 0) {
        // Stream was killed but we already have some assets — show what we have
        setStatus('⚠ Connection interrupted, but partial campaign is shown above.');
        setView('campaign');
        setCampaignComplete(true);
      } else {
        setError(isTimeout
          ? 'Server timed out — try a shorter description, or use the Cloud Run deployment for longer campaigns.'
          : msg);
        setView('landing');
      }
    }
  }, [businessInfo, mood]);

  const handleRefine = useCallback(async () => {
    if (!refinement.trim()) return;
    setIsRefining(true);
    setStatus('Refining campaign...');

    try {
      const response = await fetch('/api/refine-campaign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history: conversationHistory, refinement: refinement.trim() }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      const newAssets = [];

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const evt = JSON.parse(data);
              const kind = evt.event || evt.type;
              if (kind === 'asset') {
                newAssets.push({
                  type: evt.assetType || evt.type,
                  content: evt.content,
                  mimeType: evt.mimeType,
                  index: evt.index,
                });
              } else if (kind === 'status') {
                setStatus(evt.message);
              }
            } catch (e) {}
          }
        }
      }

      if (newAssets.length > 0) {
        setAssets(newAssets);
        setConversationHistory(prev => [
          ...prev,
          { role: 'user', parts: [{ type: 'text', content: refinement }] },
          { role: 'model', parts: [{ type: 'text', content: 'Refined campaign generated.' }] },
        ]);
      }
      setRefinement('');
      setStatus('✓ Campaign refined');
    } catch (err) {
      setError(err.message);
    }
    setIsRefining(false);
  }, [refinement, conversationHistory]);

  const handleReset = () => {
    setView('landing');
    setAssets([]);
    setStatus('');
    setModel('');
    setError('');
    setRefinement('');
    setConversationHistory([]);
    setRunId('');
    setDirectorNotes([]);
    setBrief(null);
    setQa(null);
    setActiveStep('');
    setVideoUrl('');
    setVideoStatus('');
    setIsVideoGenerating(false);
    setVideoAttempted(false);
    setCampaignComplete(false);
  };

  // Shared video generation logic — used by both auto-trigger and manual button
  const generateVideo = useCallback(async () => {
    const textAssets = assets.filter(a => a.type === 'text' && a.content && a.content.trim());
    const voScript = textAssets.map(a => a.content.trim()).join('\n\n');

    if (!voScript.trim()) {
      setVideoStatus('⚠ No text content found for the video script. Try generating a new campaign.');
      return;
    }

    // Estimate narration duration: ~140 words per minute, minimum 8s, max 60s
    const wordCount = voScript.split(/\s+/).length;
    const estimatedSeconds = Math.ceil((wordCount / 140) * 60);
    const durationSeconds = Math.max(8, Math.min(60, estimatedSeconds));

    try {
      setIsVideoGenerating(true);
      setVideoStatus('🎬 Starting video generation with Veo… (estimated ' + durationSeconds + 's video for ' + wordCount + ' words)');

      const response = await fetch('/api/generate-video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          videoPrompt: voScript,
          mood,
          channel,
          durationSeconds,
          aspectRatio: '16:9',
          resolution: '1080p',
        }),
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error('Server error: ' + errText.substring(0, 200));
      }

      // Read SSE stream
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') continue;

          let msg;
          try { msg = JSON.parse(payload); } catch (e) { continue; }

          if (msg.event === 'video_progress') {
            const elapsed = msg.elapsed || 0;
            setVideoStatus('🎬 ' + (msg.message || 'Generating video…') + (elapsed ? ' (' + elapsed + 's elapsed)' : ''));
          } else if (msg.event === 'video_complete' && msg.videoDataUrl) {
            setVideoUrl(msg.videoDataUrl);
            setVideoStatus('✓ Video generated (' + (msg.fileSizeKB || '?') + ' KB)');
            return;
          } else if (msg.event === 'video_error') {
            throw new Error(msg.message || 'Video generation failed on server');
          }
        }
      }

      // If we exit the loop without a video_complete event
      throw new Error('Video stream ended without producing a video');
    } catch (e) {
      setVideoStatus('⚠ ' + (e.message || 'Video generation failed') + '. Click "Regenerate Video Clip" to retry.');
    } finally {
      setIsVideoGenerating(false);
    }
  }, [assets, mood, channel]);

  // Auto-generate video once campaign generation is fully complete
  useEffect(() => {
    const hasTextContent = assets.some(a => a.type === 'text' && a.content && a.content.trim());
    const shouldAutoGenerateVideo =
      view === 'campaign' &&
      campaignComplete &&
      assets.length > 0 &&
      hasTextContent &&
      !videoUrl &&
      !isVideoGenerating &&
      !videoAttempted;

    if (!shouldAutoGenerateVideo) return;

    setVideoAttempted(true);
    generateVideo();
  }, [view, assets, campaignComplete, videoUrl, isVideoGenerating, videoAttempted, generateVideo]);

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="p-6 flex items-center justify-between max-w-7xl mx-auto">
        <div className="flex items-center gap-3 cursor-pointer" onClick={handleReset}>
          <span className="text-3xl">🎨</span>
          <span className="text-lg font-bold gradient-text">Direct-to-Mood Studio</span>
        </div>
        <div className="flex items-center gap-3">
          <span className="tag tag-native">Gemini Native Interleaved Output</span>
          <span className="text-xs text-white/30">v2.2-narration</span>
        </div>
      </header>

      {/* Landing */}
      {view === 'landing' && (
        <div className="max-w-5xl mx-auto px-6 py-12 animate-in">
          <div className="text-center mb-16">
            <h1 className="text-6xl font-bold gradient-text mb-4" style={{letterSpacing:'-2px'}}>
              Your AI Creative Director
            </h1>
            <p className="text-xl text-white/50 max-w-2xl mx-auto">
              Describe your business, pick a mood, and watch Gemini generate text <em>and</em> real images in a single interleaved stream — no mockups, no prompts to copy.
            </p>
          </div>

          {error && (
            <div className="mb-8 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm">
              {error}
            </div>
          )}

          {/* Demo presets */}
          <div className="glass p-5 mb-6">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div>
                <div className="text-sm font-bold text-white/70">Demo presets</div>
                <div className="text-xs text-white/35">One click to load a real, judge-safe scenario.</div>
              </div>
              <select
                className="refine-input px-4 py-2 text-sm"
                defaultValue=""
                onChange={(e) => loadDemo(e.target.value)}
              >
                <option value="" disabled>Select a demo…</option>
                {DEMOS.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
              </select>
            </div>
          </div>

          <div className="glass p-8 mb-8">
            <label className="block text-sm font-semibold text-white/60 mb-3">Describe Your Business</label>
            <textarea
              className="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 outline-none focus:border-purple-500 transition-colors resize-none"
              rows="4"
              placeholder="e.g., A cozy neighborhood coffee shop in Austin that specializes in single-origin pour-over coffee and freshly baked pastries. We target young professionals aged 25-35."
              value={businessInfo}
              onChange={e => setBusinessInfo(e.target.value)}
            />
          </div>

          {/* Brand image upload (multimodal input) */}
          <div className="glass p-6 mb-8">
            <div className="flex items-start justify-between gap-4 flex-wrap">
              <div>
                <div className="text-sm font-bold text-white/70">Brand image (optional)</div>
                <div className="text-xs text-white/35">Upload a logo/product photo so Gemini can match colors and style.</div>
              </div>
              <label className="text-xs text-purple-300 hover:text-purple-200 cursor-pointer font-semibold">
                {brandImageName ? `✓ ${brandImageName}` : 'Upload image'}
                <input
                  type="file"
                  accept="image/*"
                  className="hidden"
                  onChange={(e) => onPickBrandImage(e.target.files?.[0])}
                />
              </label>
            </div>
            {brandImageDataUrl && (
              <div className="mt-4 asset-image">
                <img src={brandImageDataUrl} alt="Brand reference" />
              </div>
            )}
          </div>

          {/* Guardrails + mode */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div className="glass p-6">
              <div className="text-sm font-bold text-white/70 mb-3">Output mode</div>
              <div className="flex gap-3">
                <button
                  type="button"
                  className={`px-4 py-2 rounded-xl text-sm font-bold ${mode === 'campaign' ? 'bg-white/10 border border-white/20' : 'bg-white/5 border border-white/10 hover:bg-white/10'}`}
                  onClick={() => setMode('campaign')}
                >
                  Campaign
                </button>
                <button
                  type="button"
                  className={`px-4 py-2 rounded-xl text-sm font-bold ${mode === 'storyboard' ? 'bg-white/10 border border-white/20' : 'bg-white/5 border border-white/10 hover:bg-white/10'}`}
                  onClick={() => setMode('storyboard')}
                >
                  Storyboard + VO
                </button>
              </div>
              <div className="mt-4 flex items-center justify-between">
                <div className="text-xs text-white/35">Auto-revise if cohesion is low</div>
                <label className="text-xs text-white/60 flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={autoRevise} onChange={(e) => setAutoRevise(e.target.checked)} />
                  Auto-revise
                </label>
              </div>
            </div>

            <div className="glass p-6">
              <div className="text-sm font-bold text-white/70 mb-3">Guardrails</div>
              <div className="grid grid-cols-1 gap-3">
                <div className="flex gap-3">
                  <select className="refine-input px-4 py-2 text-sm flex-1" value={channel} onChange={(e) => setChannel(e.target.value)}>
                    <option value="general">Channel: General</option>
                    <option value="tiktok">Channel: TikTok</option>
                    <option value="instagram">Channel: Instagram</option>
                    <option value="linkedin">Channel: LinkedIn</option>
                    <option value="youtube">Channel: YouTube</option>
                  </select>
                  <select className="refine-input px-4 py-2 text-sm flex-1" value={readingLevel} onChange={(e) => setReadingLevel(e.target.value)}>
                    <option value="simple">Reading: Simple</option>
                    <option value="general">Reading: General</option>
                    <option value="advanced">Reading: Advanced</option>
                  </select>
                </div>
                <input
                  className="refine-input px-4 py-2 text-sm"
                  placeholder="Taboo words (comma-separated), e.g. cheap, discount"
                  value={bannedWords}
                  onChange={(e) => setBannedWords(e.target.value)}
                />
              </div>
            </div>
          </div>

          <div className="mb-8">
            <label className="block text-sm font-semibold text-white/60 mb-4">Select Campaign Mood</label>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {MOODS.map(m => (
                <div
                  key={m.id}
                  className={`glass mood-card p-5 ${mood === m.id ? 'selected' : ''}`}
                  onClick={() => setMood(m.id)}
                >
                  <div className="text-2xl mb-2">{m.icon}</div>
                  <div className="font-bold text-sm">{m.name}</div>
                  <div className="text-xs text-white/40 mt-1">{m.desc}</div>
                </div>
              ))}
            </div>
          </div>

          <button
            className="generate-btn w-full py-4 rounded-xl text-white font-bold text-lg"
            disabled={!businessInfo.trim() || !mood}
            onClick={handleGenerate}
          >
            ✨ Generate Interleaved Output
          </button>

          <p className="text-center text-xs text-white/25 mt-4">
            Powered by Google Gemini · @google/genai SDK · Native TEXT + IMAGE output
          </p>
        </div>
      )}

      {/* Generating State */}
      {view === 'generating' && assets.length === 0 && (
        <div className="max-w-3xl mx-auto px-6 py-24 text-center animate-in">
          <div className="text-6xl mb-8 stream-pulse">🎨</div>
          <h2 className="text-3xl font-bold mb-4 gradient-text">Creative Director is Working</h2>
          <p className="text-white/50 mb-8">{status}</p>
          <div className="w-64 h-1 bg-white/10 rounded-full mx-auto overflow-hidden">
            <div className="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full" style={{width:'60%',animation:'shimmer 2s infinite'}} />
          </div>
        </div>
      )}

      {/* Campaign Display */}
      {(view === 'campaign' || (view === 'generating' && assets.length > 0)) && (
        <div className="max-w-4xl mx-auto px-6 py-8">
          {/* Status bar */}
          <div className="status-bar flex items-center justify-between mb-8">
            <div className="flex items-center gap-3">
              <span className="text-green-400">●</span>
              <span className="text-sm text-white/60">
                {status}
                {activeStep ? <span className="text-white/30"> · Step: {activeStep}</span> : null}
              </span>
            </div>
            <div className="flex items-center gap-3">
              {model && <span className="text-xs text-white/30">Model: {model}</span>}
              {runId && <span className="text-xs text-white/20">Run: {runId.slice(0, 8)}</span>}
              <button onClick={handleReset} className="text-xs text-purple-400 hover:text-purple-300 font-semibold">
                ← New Campaign
              </button>
            </div>
          </div>

          {/* Director notes + QA */}
          {(directorNotes.length > 0 || qa || brief) && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
              <div className="glass p-6">
                <div className="text-sm font-bold text-white/70 mb-3">🎬 Creative Director Notes (live)</div>
                <div className="text-xs text-white/35 whitespace-pre-wrap space-y-2">
                  {directorNotes.slice(-6).map((n, i) => (
                    <div key={i}>• {n}</div>
                  ))}
                  {directorNotes.length === 0 && <div>—</div>}
                </div>
              </div>
              <div className="glass p-6">
                <div className="text-sm font-bold text-white/70 mb-3">✅ QA (cohesion + compliance)</div>
                {qa ? (
                  <div className="text-xs text-white/35 space-y-2">
                    <div>Cohesion: <span className="text-white/70 font-bold">{qa.cohesion_score}/10</span></div>
                    <div>Compliance: <span className="text-white/70 font-bold">{qa.compliance_score}/10</span></div>
                    {Array.isArray(qa.issues) && qa.issues.length > 0 && (
                      <div>
                        <div className="text-white/50 font-semibold mb-1">Issues</div>
                        <ul className="list-disc list-inside space-y-1">
                          {qa.issues.slice(0, 4).map((x, i) => <li key={i}>{x}</li>)}
                        </ul>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="text-xs text-white/30">QA will appear after generation.</div>
                )}
              </div>
            </div>
          )}

          {/* Interleaved Asset Stream */}
          <div className="space-y-8">
            {assets.map((asset, i) => (
              <div key={i} className="animate-in" style={{animationDelay: `${i * 0.15}s`}}>
                {asset.type === 'text' && (
                  <div className="asset-text">
                    <div className="flex items-center gap-3 mb-3">
                      <span className="tag tag-text block w-fit">Text</span>
                      <button
                        className="text-xs text-purple-300 hover:text-purple-200 font-semibold ml-auto"
                        onClick={() => {
                          setRefinement(`Refine ONLY the text asset #${i + 1}. Keep the same mood (${mood}) and constraints. Make these changes: `);
                          window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                        }}
                      >
                        Refine this ↻
                      </button>
                    </div>
                    <div className="text-lg leading-relaxed text-white/85 whitespace-pre-wrap">
                      {asset.content}
                    </div>
                    <div className="mt-3 flex justify-end">
                      <button
                        className="text-[11px] font-semibold text-purple-300 hover:text-purple-100 bg-white/5 hover:bg-white/10 px-3 py-1 rounded-full transition-colors"
                        onClick={async () => {
                          const base = asset.content;
                          const hashtags =
                            channel === 'tiktok'
                              ? '#ad #tiktok #trending'
                              : channel === 'instagram'
                              ? '#ad #instagram #reels'
                              : channel === 'linkedin'
                              ? '#marketing #branding #b2b'
                              : channel === 'youtube'
                              ? '#ad #youtube #shorts'
                              : '#ad #marketing';
                          const url = window.location.origin;
                          const caption = `${base}\n\n${hashtags}\n${url}`;
                          try {
                            if (navigator.share) {
                              await navigator.share({ text: caption });
                            } else if (navigator.clipboard?.writeText) {
                              await navigator.clipboard.writeText(caption);
                              alert('Caption copied to clipboard for this asset.');
                            } else {
                              alert('Sharing not supported. Please copy manually:\n\n' + caption);
                            }
                          } catch (e) {
                            // user canceled share; ignore
                          }
                        }}
                      >
                        📣 Share this asset
                      </button>
                    </div>
                  </div>
                )}
                {asset.type === 'image' && (
                  <div>
                    <div className="flex items-center gap-3 mb-3">
                      <span className="tag tag-image">AI-Generated Image</span>
                      <span className="tag tag-native">Gemini Native</span>
                      <button
                        className="text-xs text-purple-300 hover:text-purple-200 font-semibold ml-auto"
                        onClick={async () => {
                          try {
                            setStatus('Regenerating image variation...');
                            const response = await fetch('/api/regen-image', {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({
                                mood,
                                prompt: `Create a variation of the campaign image. Keep the same mood (${mood}), channel (${channel}), and brand brief. Business context: ${businessInfo}`,
                                brandImageDataUrl: brandImageDataUrl || undefined,
                              }),
                            });
                            const reader = response.body.getReader();
                            const decoder = new TextDecoder();
                            let buffer = '';
                            while (true) {
                              const { done, value } = await reader.read();
                              if (done) break;
                              buffer += decoder.decode(value, { stream: true });
                              const lines = buffer.split('\n');
                              buffer = lines.pop() || '';
                              for (const line of lines) {
                                if (!line.startsWith('data: ')) continue;
                                const data = line.slice(6).trim();
                                if (data === '[DONE]') continue;
                                let evt;
                                try { evt = JSON.parse(data); } catch (parseErr) { continue; }
                                const kind = evt.event || evt.type;
                                if (kind === 'asset' && (evt.assetType || evt.type) === 'image') {
                                  const next = { type: 'image', content: evt.content, mimeType: evt.mimeType, index: asset.index };
                                  setAssets(prev => prev.map((a, idx) => (idx === i ? next : a)));
                                } else if (kind === 'status') {
                                  setStatus(evt.message);
                                }
                              }
                            }
                            setStatus('✓ Image variation generated');
                          } catch (e) {
                            setError(String(e.message || e));
                          }
                        }}
                      >
                        Regenerate ↻
                      </button>
                      <button
                        className="text-xs text-white/40 hover:text-white/70 font-semibold"
                        onClick={() => {
                          setRefinement(`Refine the campaign with focus on the image asset #${i + 1}. Keep the same mood (${mood}). Adjust the visual direction so it better matches: `);
                          window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                        }}
                      >
                        Ask to tweak
                      </button>
                    </div>
                    <div className="asset-image">
                      <img src={asset.content} alt="AI-generated campaign visual" loading="lazy" />
                    </div>
                    <div className="mt-3 flex justify-end">
                      <button
                        className="text-[11px] font-semibold text-purple-300 hover:text-purple-100 bg-white/5 hover:bg-white/10 px-3 py-1 rounded-full transition-colors"
                        onClick={async () => {
                          const base = 'AI-generated campaign visual.';
                          const hashtags =
                            channel === 'tiktok'
                              ? '#ad #tiktok #trending'
                              : channel === 'instagram'
                              ? '#ad #instagram #reels'
                              : channel === 'linkedin'
                              ? '#marketing #branding #b2b'
                              : channel === 'youtube'
                              ? '#ad #youtube #shorts'
                              : '#ad #marketing';
                          const url = window.location.origin;
                          const caption = `${base}\n\n${hashtags}\n${url}`;
                          try {
                            if (navigator.share && window.Blob) {
                              // Try sharing text only; image sharing would require File conversion support
                              await navigator.share({ text: caption });
                            } else if (navigator.clipboard?.writeText) {
                              await navigator.clipboard.writeText(caption);
                              alert('Caption copied to clipboard for this image.');
                            } else {
                              alert('Sharing not supported. Please copy manually:\n\n' + caption);
                            }
                          } catch (e) {
                            // user canceled share; ignore
                          }
                        }}
                      >
                        📣 Share this asset
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Streaming indicator */}
          {view === 'generating' && (
            <div className="mt-8 text-center stream-pulse">
              <span className="text-white/40 text-sm">Generating more assets...</span>
            </div>
          )}

          {/* Agent Refinement Panel */}
          {view === 'campaign' && assets.length > 0 && (
            <div className="mt-12 glass p-6">
              <h3 className="text-sm font-bold text-white/60 mb-3">
                🔄 Refine Campaign — Talk to the Creative Director
              </h3>
              <p className="text-xs text-white/30 mb-4">
                Ask for changes and Gemini will regenerate with updated text and images.
              </p>
              <div className="flex gap-3">
                <input
                  className="refine-input flex-1 px-4 py-3 text-sm"
                  placeholder='e.g., "Make the images warmer" or "Rewrite the hook to be shorter"'
                  value={refinement}
                  onChange={e => setRefinement(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleRefine()}
                  disabled={isRefining}
                />
                <button
                  className="generate-btn px-6 py-3 rounded-xl text-sm font-bold"
                  onClick={handleRefine}
                  disabled={isRefining || !refinement.trim()}
                >
                  {isRefining ? 'Refining...' : 'Refine ↻'}
                </button>
              </div>
            </div>
          )}

          {/* Video generation controls + Export */}
          {view === 'campaign' && assets.length > 0 && (
            <div className="mt-6 flex flex-col items-center gap-4">
              <div className="glass p-4 w-full md:w-auto text-center">
                <div className="text-xs text-white/40 mb-2">
                  Turn this storyboard/script into a short video using Gemini Veo 3.1.
                </div>
                <button
                  className="generate-btn px-6 py-3 rounded-xl text-sm font-bold"
                  disabled={isVideoGenerating}
                  onClick={() => {
                    setVideoUrl('');
                    setVideoStatus('');
                    generateVideo();
                  }}
                >
                  {isVideoGenerating ? '🎬 Video Generating…' : (videoUrl ? '↻ Regenerate Video Clip' : '🎬 Generate Video Clip')}
                </button>
                {videoStatus && (
                  <p className="mt-2 text-xs text-white/35 whitespace-pre-wrap">{videoStatus}</p>
                )}
                {videoUrl && (
                  <div className="mt-4">
                    <video
                      ref={videoRef}
                      controls
                      loop
                      playsInline
                      className="w-full max-w-xl mx-auto rounded-xl shadow-lg"
                      src={videoUrl}
                    />
                    <div className="mt-3 flex items-center justify-between gap-3">
                      <button
                        className="text-[11px] font-semibold text-white bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-500 hover:to-pink-400 px-4 py-1.5 rounded-full transition-all"
                        onClick={async () => {
                          // Cancel any existing speech
                          window.speechSynthesis.cancel();

                          // Gather ALL text assets for full narration
                          const allText = assets
                            .filter(a => a.type === 'text' && a.content && a.content.trim())
                            .map(a => a.content.trim())
                            .join('.\n\n');

                          if (!allText) return;

                          const vid = videoRef.current;

                          // Start video playback (looping so it covers the full narration)
                          if (vid) {
                            vid.loop = true;
                            vid.currentTime = 0;
                            vid.muted = false;
                            vid.volume = 0.15; // low background audio so narration is clear
                            try { await vid.play(); } catch (e) { /* autoplay may be blocked */ }
                          }

                          // Start narration after a brief pause
                          const utter = new SpeechSynthesisUtterance(allText);
                          utter.rate = 0.9;
                          utter.pitch = 1.0;
                          utter.volume = 1.0;

                          utter.onend = () => {
                            // Stop video looping and let it finish current playback
                            if (vid) {
                              vid.loop = false;
                              // Fade out after a short grace period
                              setTimeout(() => {
                                if (vid && !vid.paused) vid.pause();
                              }, 2000);
                            }
                          };

                          utter.onerror = () => {
                            if (vid) vid.loop = false;
                          };

                          window.speechSynthesis.speak(utter);
                        }}
                      >
                        ▶ Play Video with Full Narration
                      </button>
                      <button
                        className="text-[11px] font-semibold text-purple-300 hover:text-purple-100 bg-white/5 hover:bg-white/10 px-3 py-1 rounded-full transition-colors"
                        onClick={async () => {
                          const base = 'AI-generated campaign video asset.';
                          const hashtags =
                            channel === 'tiktok'
                              ? '#ad #tiktok #trending'
                              : channel === 'instagram'
                              ? '#ad #instagram #reels'
                              : channel === 'linkedin'
                              ? '#marketing #branding #b2b'
                              : channel === 'youtube'
                              ? '#ad #youtube #shorts'
                              : '#ad #marketing';
                          const appUrl = window.location.origin;
                          const caption = `${base}\n\n${hashtags}\n${appUrl}`;
                          try {
                            if (navigator.share) {
                              await navigator.share({ text: caption });
                            } else if (navigator.clipboard?.writeText) {
                              await navigator.clipboard.writeText(caption);
                              alert('Caption copied to clipboard for this video.');
                            } else {
                              alert('Sharing not supported. Please copy manually:\n\n' + caption);
                            }
                          } catch (e) {}
                        }}
                      >
                        📣 Share this asset
                      </button>
                    </div>
                    <p className="mt-1 text-[10px] text-white/30">
                      Click "Play Video with Full Narration" to hear all campaign text narrated over the video. The video loops until narration finishes, then stops.
                    </p>
                  </div>
                )}
              </div>
              <div className="flex gap-3 justify-center">
                <button
                  className="text-sm text-white/40 hover:text-white/70 transition-colors"
                  onClick={() => {
                    const text = assets.filter(a => a.type === 'text').map(a => a.content).join('\n\n---\n\n');
                    navigator.clipboard.writeText(text);
                  }}
                >
                  📋 Copy All Text
                </button>
                <button
                  className="text-sm text-white/40 hover:text-white/70 transition-colors"
                  onClick={async () => {
                    const zip = new window.JSZip();
                    const safeName = (mood || 'campaign') + '-' + (Date.now());
                    const folder = zip.folder(safeName);

                    const campaignJson = {
                      mood,
                      channel,
                      readingLevel,
                      mode,
                      businessInfo,
                      model,
                      assets,
                      brief,
                      qa,
                      videoUrl,
                    };
                    folder.file('campaign.json', JSON.stringify(campaignJson, null, 2));

                    const md = [
                      `# Campaign (${safeName})`,
                      ``,
                      `**Mood**: ${mood}`,
                      `**Channel**: ${channel}`,
                      `**Mode**: ${mode}`,
                      model ? `**Model**: ${model}` : null,
                      ``,
                      `## Assets`,
                      ``,
                      ...assets.map((a, idx) => {
                        if (a.type === 'text') return `### Text ${idx + 1}\n\n${a.content}\n`;
                        if (a.type === 'image') return `### Image ${idx + 1}\n\n![image](images/image-${idx + 1}.png)\n`;
                        return `### ${a.type} ${idx + 1}\n\n${String(a.content || '')}\n`;
                      }).filter(Boolean),
                    ].filter(Boolean).join('\n');
                    folder.file('campaign.md', md);

                    const imgFolder = folder.folder('images');
                    let imgCount = 0;
                    for (let i = 0; i < assets.length; i++) {
                      const a = assets[i];
                      if (a.type !== 'image' || typeof a.content !== 'string') continue;
                      const m = a.content.match(/^data:([^;]+);base64,(.+)$/);
                      if (!m) continue;
                      const ext = (m[1] || 'image/png').includes('jpeg') ? 'jpg' : 'png';
                      imgFolder.file(`image-${i + 1}.${ext}`, m[2], { base64: true });
                      imgCount++;
                    }

                    if (videoUrl) {
                      try {
                        const resp = await fetch(videoUrl);
                        if (resp.ok) {
                          const ab = await resp.arrayBuffer();
                          folder.file('video/video.mp4', ab);
                        }
                      } catch (e) {
                        // skip video if download fails
                      }
                    }

                    const blob = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${safeName}.zip`;
                    a.click();
                    URL.revokeObjectURL(url);
                    setStatus(`✓ Exported bundle with ${imgCount} images${videoUrl ? ' + video' : ''}`);
                  }}
                >
                  ⬇️ Download Bundle (.zip)
                </button>
                <button
                  className="text-sm text-white/40 hover:text-white/70 transition-colors"
                  onClick={() => {
                    const utter = new SpeechSynthesisUtterance(
                      assets.filter(a => a.type === 'text').map(a => a.content).join('\n\n')
                    );
                    utter.rate = 1.0;
                    utter.pitch = 1.0;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utter);
                  }}
                >
                  🔊 Play Voiceover
                </button>
                <button
                  className="text-sm text-white/40 hover:text-white/70 transition-colors"
                  onClick={async () => {
                    const firstText = assets.find(a => a.type === 'text');
                    const ctaText = assets.filter(a => a.type === 'text').slice(-1)[0];
                    const base = [
                      firstText ? firstText.content : '',
                      '',
                      ctaText && ctaText !== firstText ? ctaText.content : '',
                      '',
                    ].join('\n').trim();

                    const hashtags =
                      channel === 'tiktok'
                        ? '#ad #tiktok #trending'
                        : channel === 'instagram'
                        ? '#ad #instagram #reels'
                        : channel === 'linkedin'
                        ? '#marketing #branding #b2b'
                        : channel === 'youtube'
                        ? '#ad #youtube #shorts'
                        : '#ad #marketing';

                    const appUrl = window.location.origin;
                    const caption = `${base}\n\n${hashtags}\n${appUrl}`;

                    try {
                      if (navigator.share) {
                        await navigator.share({ text: caption });
                      } else if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(caption);
                        alert('Social caption copied to clipboard.');
                      } else {
                        alert('Sharing not supported in this browser. Please copy the caption manually:\n\n' + caption);
                      }
                    } catch (e) {
                      // user canceled share; no-op
                    }
                  }}
                >
                  📣 Share Social Caption
                </button>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-16 text-center text-xs text-white/20 pb-8">
            <p>Direct-to-Mood Marketing Studio v2 · Powered by Google Gemini · @google/genai SDK</p>
            <p className="mt-1">Native interleaved TEXT + IMAGE output · #GeminiLiveAgentChallenge</p>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
